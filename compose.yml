services:
  homelab-manager:
    build: .
    container_name: homelab-manager
    ports:
      - "3456:3456"
    volumes:
      - /home/slayo/docker:/homelab/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/slayo/docker/wow/azerothcore-wotlk:/wow
      - ./data:/data
      - /opt/backups/wow:/backups
    environment:
      - WOW_PATH=/wow
      - WOW_COMPOSE_PATH=/wow
      - STATE_PATH=/data/state.json
      - DB_PATH=/data/homelab.db
      - BACKUP_DIR=/backups
      - PORT=3456
      # OpenClaw AI Gateway (optional — disabled without these)
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-openai/gpt-5.4}
      - OPENCLAW_SYSTEM_PROMPT=${OPENCLAW_SYSTEM_PROMPT:-}
      # Synthiq AI Gateway (optional — disabled without these)
      - SYNTHIQ_GATEWAY_URL=${SYNTHIQ_GATEWAY_URL:-}
      - SYNTHIQ_GATEWAY_TOKEN=${SYNTHIQ_GATEWAY_TOKEN:-}
      - SYNTHIQ_MODEL=${SYNTHIQ_MODEL:-openai/gpt-5.4}
      - SYNTHIQ_SYSTEM_PROMPT=${SYNTHIQ_SYSTEM_PROMPT:-}
      # GitHub OAuth (optional — auth disabled without these)
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}
      - GITHUB_OAUTH_REDIRECT_URI=${GITHUB_OAUTH_REDIRECT_URI:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - GITHUB_ALLOWED_USERS=${GITHUB_ALLOWED_USERS:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.homelab.entrypoints=https"
      - "traefik.http.routers.homelab.rule=Host(`homelab.devcraft.team`)"
      - "traefik.http.routers.homelab.tls=true"
      - "traefik.http.routers.homelab.tls.certresolver=cloudflare"
      - "traefik.http.services.homelab.loadbalancer.server.port=3456"
      - "traefik.http.routers.homelab.middlewares=default-whitelist@file"
    networks:
      proxy:
    restart: unless-stopped

networks:
  proxy:
    external: true
