services:
  homelab-manager:
    build: .
    container_name: homelab-manager
    ports:
      - "3456:3456"
    volumes:
      - /home/slayo/docker:/homelab/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/slayo/docker/wow/azerothcore-wotlk:/wow
      - ./data:/data
      - /opt/backups/wow:/backups
    environment:
      - WOW_PATH=/wow
      - WOW_COMPOSE_PATH=/wow
      - STATE_PATH=/data/state.json
      - BACKUP_DIR=/backups
      - PORT=3456
    restart: unless-stopped
