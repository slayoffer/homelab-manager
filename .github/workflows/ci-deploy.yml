name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy to slayo
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync and rebuild
        env:
          OPENCLAW_GATEWAY_URL: ${{ secrets.OPENCLAW_GATEWAY_URL }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          OPENCLAW_MODEL: ${{ secrets.OPENCLAW_MODEL }}
          SYNTHIQ_GATEWAY_URL: ${{ secrets.SYNTHIQ_GATEWAY_URL }}
          SYNTHIQ_GATEWAY_TOKEN: ${{ secrets.SYNTHIQ_GATEWAY_TOKEN }}
          SYNTHIQ_MODEL: ${{ secrets.SYNTHIQ_MODEL }}
        run: |
          DEPLOY_PATH="/home/slayo/docker/homelab-manager"

          # Copy source files
          cp -r server "$DEPLOY_PATH/"
          cp -r src "$DEPLOY_PATH/"
          cp package.json package-lock.json Dockerfile "$DEPLOY_PATH/"
          cp compose.yml "$DEPLOY_PATH/"
          cp -r .github "$DEPLOY_PATH/" 2>/dev/null || true

          # Generate .env from secrets
          printf '%s\n' \
            "OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL}" \
            "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}" \
            "OPENCLAW_MODEL=${OPENCLAW_MODEL}" \
            "SYNTHIQ_GATEWAY_URL=${SYNTHIQ_GATEWAY_URL}" \
            "SYNTHIQ_GATEWAY_TOKEN=${SYNTHIQ_GATEWAY_TOKEN}" \
            "SYNTHIQ_MODEL=${SYNTHIQ_MODEL}" \
            > "$DEPLOY_PATH/.env"

          # Rebuild container
          cd "$DEPLOY_PATH"
          docker compose up -d --build
